baseURL = "https://preritahuja.com/"
languageCode = "en-gb"
defaultContentLanguage = "en-gb"
title = "Prerit Ahuja"

# Single-page site: no taxonomies, no list pages, no RSS.
disableKinds = ["taxonomy", "term", "section", "rss"]

[params]
author = "Prerit Ahuja"
description = "Prerit Ahuja. AI and data leader in regulated financial services, building and governing enterprise AI operating models from zero to production. Global CDO Top 100 (2026). London."
headshot = "/images/headshot.jpeg"
ogImage = "/images/headshot.jpeg"
location = "London"
linkedin = "https://www.linkedin.com/in/ahujaprerit/"
orcid = "0009-0004-0147-4192"
orcidURL = "https://orcid.org/0009-0004-0147-4192"

[params.hero]
headline = "AI & Data Leader in Regulated Financial Services"
subheadline = "Enterprise AI operating models, built from zero to governed production."
microline = "London · Global CDO Top 100 (2026)"

# Drives the sticky section nav, in order.
#   name  = label in the nav strip
#   title = full section heading
#   cue   = hero scroll-cue wording (first entry only)
#   cta   = hero button label (first entry only)
[[params.nav]]
name = "About"
title = "About"
anchor = "about"
cue = "Scroll to read on"
cta = "About Me"

[[params.nav]]
name = "Proof"
title = "Selected Proof"
anchor = "proof"

[[params.nav]]
name = "Research"
title = "Research & Writing"
anchor = "research"

[[params.nav]]
name = "Speaking"
title = "Speaking"
anchor = "speaking"

[[params.nav]]
name = "Recognition"
title = "Recognition"
anchor = "recognition"

[[params.nav]]
name = "Contact"
title = "Contact"
anchor = "contact"

[markup.goldmark.renderer]
unsafe = true

[minify]
disableXML = true
  [minify.tdewolff.html]
  keepQuotes = true
