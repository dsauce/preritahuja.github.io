baseURL = "https://preritahuja.com/"
languageCode = "en-gb"
defaultContentLanguage = "en-gb"
title = "Prerit Ahuja"

# Single-page site: no taxonomies, no list pages, no RSS.
disableKinds = ["taxonomy", "term", "section", "rss"]

[params]
author = "Prerit Ahuja"
description = "Prerit Ahuja. AI and data leader in regulated financial services, building and governing enterprise AI operating models from zero to production. Global CDO Top 100 (2026). London."
headshot = "/images/headshot.jpeg"
ogImage = "/images/headshot.jpeg"
location = "London"
linkedin = "https://www.linkedin.com/in/ahujaprerit/"
orcid = "0009-0004-0147-4192"
orcidURL = "https://orcid.org/0009-0004-0147-4192"

# Contact email, XOR-hex obfuscated (Cloudflare-style). Never store the address in plaintext.
# Regenerate after changing the address:
#   node -e 'const e="you@example.com",k=0x5b;let o=k.toString(16).padStart(2,"0");
#   for(const c of e)o+=(c.charCodeAt(0)^k).toString(16).padStart(2,"0");console.log(o)'
emailEncoded = "5b2b293e29322f636d1b3c363a323775383436"

[params.hero]
headline = "AI & Data Leader in Regulated Financial Services"
subheadline = "Enterprise AI operating models, built from zero to governed production."
microline = "London · Global CDO Top 100 (2026)"

# Nav order also drives the "next section" links at the foot of each section.
#   name  = label in the sticky nav bar
#   title = full section heading, used by the next-section link
#   cta   = overrides the next-section link label (hero only)
[[params.nav]]
name = "About"
title = "About"
anchor = "about"
cta = "About Me"

[[params.nav]]
name = "Proof"
title = "Selected Proof"
anchor = "proof"

[[params.nav]]
name = "Research"
title = "Research & Writing"
anchor = "research"

[[params.nav]]
name = "Speaking"
title = "Speaking"
anchor = "speaking"

[[params.nav]]
name = "Recognition"
title = "Recognition"
anchor = "recognition"

[[params.nav]]
name = "Contact"
title = "Contact"
anchor = "contact"

[markup.goldmark.renderer]
unsafe = true

[minify]
disableXML = true
  [minify.tdewolff.html]
  keepQuotes = true
