{{- $css := resources.Get "css/main.css" | minify | fingerprint -}}
<!DOCTYPE html>
<html lang="en-gb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Page not found · {{ site.Title }}</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
<link rel="stylesheet" href="{{ $css.RelPermalink }}">
<script>(function(){var d=document.documentElement;try{var t=localStorage.getItem("theme");if(t==="light"||t==="dark")d.dataset.theme=t;}catch(e){}})();</script>
</head>
<body>
<main id="main">
  <section class="hero">
    <div class="wrap">
      <h1>Page not found</h1>
      <p class="subheadline">That page does not exist. Everything now lives on one page.</p>
      <p class="actions"><a class="btn" href="/">Go to preritahuja.com</a></p>
    </div>
  </section>
</main>
</body>
</html>
