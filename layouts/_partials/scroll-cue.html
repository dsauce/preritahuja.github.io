{{- /* Scroll affordance at the foot of a section. Takes the NEXT nav entry. */ -}}
{{- with . -}}
<a class="scroll-cue" href="#{{ .anchor }}">
  <span class="scroll-cue-arrow" aria-hidden="true">
    <svg viewBox="0 0 24 24" focusable="false"><path d="M12 4v14m0 0-6.5-6.5M12 18l6.5-6.5"/></svg>
  </span>
  <span class="scroll-cue-text">{{ or .cue .title }}</span>
</a>
{{- end -}}
