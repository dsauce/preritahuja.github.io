{{ with site.Params.social }}
<ul>
  {{ range . }}
    <li>
      <a href="{{ .url }}" aria-label="{{ .name }}" target="_blank" rel="noopener noreferrer" {{ with .weight }}data-weight="{{ . }}"{{ end }}>
        <i class="{{ .icon }}" aria-hidden="true"></i>
      </a>
    </li>
  {{ end }}
</ul>
{{ end }}
